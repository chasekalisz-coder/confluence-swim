
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Confluence Swim — Technique Session</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root { --ink: #121212; --gold: #B8956A; --gold-soft: #D4B896; --paper: #FAF9F6; --muted: #6B6B6B; --rule: #E8E4DD; --danger: #B84545; --success: #2d7a2d; --teal: #2dd4bf; --teal-soft: #99f6e4; }
  * { box-sizing: border-box; }
  body { font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif; background: var(--paper); color: var(--ink); margin: 0; padding: 0; min-height: 100vh; }
  .form-container { max-width: 820px; margin: 0 auto; padding: 40px 20px; }
  .form-title { font-family: "Fraunces", Georgia, serif; font-weight: 500; font-size: 2rem; margin: 0 0 4px; }
  .form-subtitle { color: var(--muted); font-size: 0.78rem; margin-bottom: 32px; text-transform: uppercase; letter-spacing: 0.12em; }
  .form-subtitle a { color: var(--teal); text-decoration: none; font-weight: 600; }
  .card { background: white; border: 1px solid var(--rule); border-radius: 4px; padding: 24px; margin-bottom: 20px; }
  .card-title { font-family: "Fraunces", Georgia, serif; font-size: 1.15rem; font-weight: 500; margin: 0 0 16px; }
  label { display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
  input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--rule); border-radius: 3px; font-size: 0.95rem; font-family: inherit; background: white; color: var(--ink); margin-bottom: 16px; }
  textarea { min-height: 80px; resize: vertical; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .pool-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
  .pool-btn { flex: 1; padding: 12px; border: 2px solid var(--rule); background: white; color: var(--ink); font-size: 0.95rem; font-weight: 600; cursor: pointer; border-radius: 3px; }
  .pool-btn.active { border-color: var(--teal); background: var(--teal); color: white; }
  .required { color: var(--danger); font-weight: 600; }
  button.generate { width: 100%; padding: 14px; background: var(--ink); color: white; border: none; font-size: 0.9rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; border-radius: 3px; }
  button.generate:disabled { background: #bbb; cursor: not-allowed; }
  .photo-section { margin-bottom: 16px; }
  .photo-preview { max-width: 200px; max-height: 200px; border: 1px solid var(--rule); border-radius: 3px; display: block; margin-top: 8px; }
  .photo-status { color: var(--muted); font-size: 0.85rem; margin-bottom: 8px; }
  .photo-status.ready { color: var(--success); }
  .loading { display: none; text-align: center; padding: 80px 20px; color: var(--muted); }
  .loading.active { display: block; }
  .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--rule); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { background: #fce8e8; border: 1px solid var(--danger); color: var(--danger); padding: 16px; border-radius: 3px; margin-bottom: 16px; font-size: 0.9rem; white-space: pre-wrap; }
  .note-page { max-width: 820px; margin: 0 auto; padding: 40px 20px 80px; }
  .action-bar { display: flex; gap: 8px; justify-content: flex-end; margin-bottom: 24px; flex-wrap: wrap; }
  .action-btn { padding: 10px 18px; border: 1px solid var(--rule); background: white; color: var(--ink); font-size: 0.8rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; border-radius: 3px; font-family: inherit; }
  .action-btn:hover { border-color: var(--gold); }
  .action-btn.primary { background: var(--ink); color: white; border-color: var(--ink); }
  .action-btn.primary:hover { background: var(--gold); border-color: var(--gold); }
  .note { background: white; border: 1px solid var(--rule); padding: 56px 64px; }
  .note-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
  .note-logo { width: 160px; }
  .note-logo img { width: 100%; height: auto; display: block; }
  .note-meta { text-align: right; font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; line-height: 1.8; }
  .note-meta strong { color: var(--ink); font-weight: 600; }
  .athlete-block { margin-bottom: 40px; }
  .athlete-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted); margin-bottom: 8px; font-weight: 600; }
  .athlete-name { font-family: "Fraunces", Georgia, serif; font-size: 3rem; font-weight: 500; line-height: 1.05; margin: 0 0 12px; letter-spacing: -0.02em; }
  .athlete-rule { width: 60px; height: 2px; background: var(--gold); margin-bottom: 14px; }
  .athlete-tags { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); font-weight: 600; }
  .athlete-tags .sep { color: var(--gold); margin: 0 8px; }
  .focus-map { margin-bottom: 40px; }
  .focus-map-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted); font-weight: 600; margin-bottom: 12px; }
  .focus-map-row { display: flex; flex-wrap: wrap; gap: 4px; }
  .focus-phase { padding: 8px 14px; border: 1px solid var(--rule); border-radius: 3px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); background: var(--paper); }
  .focus-phase.active { background: var(--gold); color: white; border-color: var(--gold); }
  .section { display: grid; grid-template-columns: 100px 1fr; gap: 32px; margin-bottom: 40px; align-items: start; }
  .section-num { font-family: "Fraunces", Georgia, serif; font-size: 4rem; font-weight: 400; color: var(--gold); line-height: 1; }
  .section-content .section-title { font-family: "Inter", sans-serif; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--gold); font-weight: 600; margin-bottom: 14px; }
  .section-content p { font-family: "Fraunces", Georgia, serif; font-size: 1rem; font-weight: 400; line-height: 1.65; margin: 0 0 16px; }
  .section-content p:last-child { margin-bottom: 0; }
  .note-footer { border-top: 1px solid var(--rule); margin-top: 48px; padding-top: 24px; display: flex; justify-content: space-between; font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .save-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--ink); color: white; padding: 14px 24px; border-radius: 4px; font-size: 0.9rem; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.2); z-index: 2000; transition: transform 0.25s ease; pointer-events: none; }
  .save-toast.show { transform: translateX(-50%) translateY(0); }
  .save-toast.error { background: var(--danger); }
  @media print {
    @page { size: letter portrait; margin: 0.5in 0.5in; }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    html, body { background: white !important; padding: 0; margin: 0; }
    .form-container, .action-bar, .loading { display: none !important; }
    .note-page { padding: 0; max-width: none; margin: 0; }
    .note { border: none; padding: 0; }
    .note-header { margin-bottom: 14px; }
    .note-logo { width: 130px; }
    .athlete-name { font-size: 1.85rem; }
    .athlete-block { margin-bottom: 16px; }
    .focus-map { margin-bottom: 18px; }
    .focus-phase { padding: 5px 10px; font-size: 0.65rem; }
    .section { margin-bottom: 14px; grid-template-columns: 60px 1fr; gap: 14px; }
    .section-num { font-size: 2.2rem; }
    .section-content p { font-size: 0.78rem; line-height: 1.4; }
    .note-footer { margin-top: 14px; padding-top: 8px; font-size: 0.55rem; }
  }
  @media (max-width: 640px) {
    .note { padding: 32px 24px; }
    .section { grid-template-columns: 60px 1fr; gap: 16px; }
    .section-num { font-size: 2.5rem; }
    .athlete-name { font-size: 2.25rem; }
    .row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="formView" class="form-container">
  <h1 class="form-title">Technique Session</h1>
  <div class="form-subtitle">Confluence Swim &middot; Stroke Correction Note &nbsp;&middot;&nbsp; <a href="/">&larr; Back to app</a></div>
  <div class="card">
    <label>Athlete</label>
    <select id="athleteId">
      <option value="ath_jon">Jon Pomper (12)</option>
      <option value="ath_lana">Lana Pomper (9)</option>
      <option value="ath_ben">Ben Pomper (12)</option>
      <option value="ath_kaden">Kaden Sun (10)</option>
      <option value="ath_farris">Farris (9)</option>
      <option value="ath_hannah">Hannah Montgomery (12)</option>
      <option value="ath_grace">Grace Montgomery (12)</option>
      <option value="ath_marley">Marley Taylor (14)</option>
      <option value="ath_liam">Liam Aikey (10)</option>
    </select>
    <label>Session Type <span class="required">*required</span></label>
    <select id="sessionType" onchange="updateBtn()">
      <option value="">Pick session type...</option>
      <option value="freestyle">Freestyle</option>
      <option value="backstroke">Backstroke</option>
      <option value="breaststroke">Breaststroke</option>
      <option value="butterfly">Butterfly</option>
      <option value="im">IM</option>
      <option value="kick">Kick</option>
      <option value="turns">Turns</option>
      <option value="starts">Starts</option>
      <option value="underwaters">Underwaters / Breakouts / Finishes</option>
    </select>
    <label>Pool Type <span class="required">*required</span></label>
    <div class="pool-toggle">
      <button type="button" class="pool-btn" data-pool="SCY" onclick="setPool('SCY')">SCY</button>
      <button type="button" class="pool-btn" data-pool="LCM" onclick="setPool('LCM')">LCM</button>
    </div>
    <div class="row">
      <div><label>Duration (minutes)</label><input id="duration" type="number" placeholder="e.g., 60" /></div>
      <div><label>Session Number (optional)</label><input id="sessionNum" type="number" placeholder="e.g., 12" /></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Coach Observations</div>
    <label>What I Observed</label>
    <textarea id="coachObserved" placeholder="What did you see? e.g., His elbow is dropping on the catch, head is lifting at the breath, kick stops when he breathes..." oninput="updateBtn()"></textarea>
    <label>What We Worked On</label>
    <textarea id="coachWorkedOn" placeholder="What drills/corrections did you do? e.g., Fist drill to feel the forearm, single-arm with breathing focus, sculling at extension..." oninput="updateBtn()"></textarea>
    <label>What Improved</label>
    <textarea id="coachImproved" placeholder="What got better during the session? e.g., Started getting fingertips down before pulling, head staying lower on the breath by the end..." oninput="updateBtn()"></textarea>
    <label>What Still Needs Work</label>
    <textarea id="coachNeedsWork" placeholder="What didn't change or needs more time? e.g., Still losing the high elbow when he gets tired, kick still stops on the breathing side..." oninput="updateBtn()"></textarea>
  </div>
  <div class="card photo-section">
    <label>Session Photo (optional)</label>
    <div class="photo-status" id="photoStatus">No photo attached</div>
    <input type="file" accept="image/jpeg,image/png" onchange="handlePhoto(event)" />
    <img id="photoPreview" class="photo-preview" style="display:none" />
  </div>
  <div class="error" id="errorBox" style="display:none"></div>
  <button class="generate" id="generateBtn" onclick="generate()" disabled>Generate Technique Note</button>
</div>
<div id="loading" class="loading"><div class="spinner"></div><div>Analyzing stroke mechanics...</div></div>
<div id="noteView" class="note-page" style="display:none">
  <div class="action-bar">
    <button class="action-btn" onclick="backToForm()">&larr; New Technique Session</button>
    <button class="action-btn" onclick="window.print()">Print / Save PDF</button>
    <button class="action-btn primary" onclick="saveSession()">Save to Athlete</button>
  </div>
  <div id="saveToast" class="save-toast"></div>
  <div class="note" id="noteRoot"></div>
</div>
<script>
var selectedPool = null, photoBase64 = null, photoMediaType = null, currentNoteData = null;
var LOGO_DATA_URL = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAB+gAAAG+CAYAAACwMl2lAAAACXBIWXMAAAsTAAALEwEAmpwYAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAABhSURBVHgB7cEBDQAAAMKg909tDwcUAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA4GYNFwABaOijIgAAAABJRU5ErkJggg==";
var ATHLETES = {
  ath_jon:{name:"Jon Pomper",age:12},ath_lana:{name:"Lana Pomper",age:9},ath_ben:{name:"Ben Pomper",age:12},
  ath_kaden:{name:"Kaden Sun",age:10},ath_farris:{name:"Farris",age:9},ath_hannah:{name:"Hannah Montgomery",age:12},
  ath_grace:{name:"Grace Montgomery",age:12},ath_marley:{name:"Marley Taylor",age:14},ath_liam:{name:"Liam Aikey",age:10}
};
var SESSION_TYPE_LABELS = {freestyle:'Freestyle',backstroke:'Backstroke',breaststroke:'Breaststroke',butterfly:'Butterfly',im:'IM',kick:'Kick',turns:'Turns',starts:'Starts',underwaters:'Underwaters / Breakouts / Finishes'};

function setPool(pool) {
  selectedPool = pool;
  document.querySelectorAll('.pool-btn').forEach(function(btn){btn.classList.toggle('active',btn.dataset.pool===pool);});
  updateBtn();
}
function handlePhoto(e) {
  var file = e.target.files[0]; if(!file) return;
  var type = file.type.toLowerCase();
  if(type==='image/heic'||type==='image/heif'){alert('HEIC not supported. Use JPG or PNG.');e.target.value='';return;}
  var reader = new FileReader();
  reader.onload = function(ev){photoBase64=ev.target.result.split(',')[1];photoMediaType=type;document.getElementById('photoStatus').textContent='\u2713 Photo ready';document.getElementById('photoStatus').classList.add('ready');document.getElementById('photoPreview').src=ev.target.result;document.getElementById('photoPreview').style.display='block';};
  reader.readAsDataURL(file);
}
function updateBtn() {
  var hasPool = !!selectedPool;
  var hasType = !!document.getElementById('sessionType').value;
  var hasText = ['coachObserved','coachWorkedOn','coachImproved','coachNeedsWork'].some(function(id){return (document.getElementById(id).value||'').trim().length>0;});
  document.getElementById('generateBtn').disabled = !(hasPool && hasType && hasText);
}
function generate() {
  var payload = {
    athleteId: document.getElementById('athleteId').value,
    poolType: selectedPool,
    sessionType: document.getElementById('sessionType').value,
    sessionNumber: parseInt(document.getElementById('sessionNum').value)||null,
    durationMinutes: parseInt(document.getElementById('duration').value)||null,
    coachObserved: document.getElementById('coachObserved').value.trim()||null,
    coachWorkedOn: document.getElementById('coachWorkedOn').value.trim()||null,
    coachImproved: document.getElementById('coachImproved').value.trim()||null,
    coachNeedsWork: document.getElementById('coachNeedsWork').value.trim()||null,
    photoBase64: photoBase64, photoMediaType: photoMediaType
  };
  document.getElementById('formView').style.display='none';
  document.getElementById('loading').classList.add('active');
  document.getElementById('errorBox').style.display='none';
  fetch('/api/generate-technique-note',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
  .then(function(res){return res.json().then(function(data){return {ok:res.ok,data:data};});})
  .then(function(result){
    document.getElementById('loading').classList.remove('active');
    if(!result.ok){showError(result.data);document.getElementById('formView').style.display='block';return;}
    currentNoteData = Object.assign({},result.data,{_formMeta:payload});
    renderNote(currentNoteData);
    document.getElementById('noteView').style.display='block';
    window.scrollTo(0,0);
  })
  .catch(function(err){document.getElementById('loading').classList.remove('active');document.getElementById('formView').style.display='block';showError({error:'Request failed',detail:String(err)});});
}
function showError(data){var box=document.getElementById('errorBox');box.style.display='block';box.textContent=(data.error||'Error')+(data.detail?'\n\n'+(typeof data.detail==='string'?data.detail:JSON.stringify(data.detail,null,2)):'');}
function backToForm(){document.getElementById('noteView').style.display='none';document.getElementById('formView').style.display='block';currentNoteData=null;}
function saveSession(){
  if(!currentNoteData) return;
  var meta = currentNoteData._formMeta||{};
  var payload = {athleteId:meta.athleteId,date:new Date().toISOString().split('T')[0],category:'technique',poolType:meta.poolType,stroke:meta.sessionType,sessionNumber:meta.sessionNumber,durationMinutes:meta.durationMinutes,coachIntent:null,coachObservation:null,mainSet:null,hiLo:null,note:currentNoteData.note,charts:[],warnings:currentNoteData.warnings,rawModelOutput:currentNoteData.rawModelOutput,correctedData:null,wasRegenerated:false,model:currentNoteData.model,noteType:'technique'};
  fetch('/api/save-session',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
  .then(function(res){return res.json().then(function(d){if(!res.ok){showToast('Save failed: '+(d.error||'unknown'),true);return;}showToast('Technique session saved!');});})
  .catch(function(err){showToast('Save failed: '+String(err),true);});
}
function showToast(msg,isError){var toast=document.getElementById('saveToast');toast.textContent=msg;toast.classList.toggle('error',!!isError);toast.classList.add('show');setTimeout(function(){toast.classList.remove('show');},3800);}
function renderNote(data){
  var meta=data._formMeta,athleteInfo=ATHLETES[meta.athleteId]||{},athleteName=athleteInfo.name||meta.athleteId;
  var today=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  var note=data.note||{},focusMap=data.focusMap||{},sessionLabel=SESSION_TYPE_LABELS[meta.sessionType]||meta.sessionType;
  var phases=focusMap.phases||[],highlighted=(focusMap.highlighted||[]).map(function(h){return h.toLowerCase();});
  var focusMapHtml=phases.map(function(p){var isActive=highlighted.indexOf(p.toLowerCase())>=0;return '<span class="focus-phase'+(isActive?' active':'')+'">'+esc(p)+'</span>';}).join('');
  var secs=[{key:'section_01',num:'01',title:'WHAT WE WORKED ON'},{key:'section_02',num:'02',title:'WHAT IMPROVED'},{key:'section_03',num:'03',title:"WHAT\u2019S NEXT"},{key:'section_04',num:'04',title:'NEXT SESSION'}];
  var secsHtml=secs.map(function(s){if(!note[s.key])return '';return '<div class="section"><div class="section-num">'+s.num+'</div><div class="section-content"><div class="section-title">'+esc(s.title)+'</div>'+prose(note[s.key])+'</div></div>';}).join('');
  document.getElementById('noteRoot').innerHTML=
    '<div class="note-header"><div class="note-logo"><img src="'+LOGO_DATA_URL+'" alt="Confluence Swim" /></div><div class="note-meta"><div><strong>'+esc(today)+'</strong></div><div>Technique \u00b7 '+esc(sessionLabel)+'</div><div>'+meta.poolType+'</div><div>Robson &amp; Lindley \u00b7 SMU</div></div></div>'+
    '<div class="athlete-block"><div class="athlete-label">Athlete</div><h2 class="athlete-name">'+esc(athleteName)+'</h2><div class="athlete-rule"></div><div class="athlete-tags">Technique<span class="sep">\u00b7</span>'+esc(sessionLabel)+'<span class="sep">\u00b7</span>'+meta.poolType+'</div></div>'+
    '<div class="focus-map"><div class="focus-map-label">Session Focus</div><div class="focus-map-row">'+focusMapHtml+'</div></div>'+
    secsHtml+
    '<div class="note-footer"><div>confluencesport.com \u00b7 Dallas, TX</div><div>Athlete &amp; Family Use Only</div></div>';
}
function prose(text){if(!text)return '';return text.split(/\n\n+/).map(function(p){return p.trim();}).filter(Boolean).map(function(p){return '<p>'+esc(p).replace(/\n/g,'<br>')+'</p>';}).join('');}
function esc(s){if(s===null||s===undefined)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
(function(){
  var params=new URLSearchParams(window.location.search);
  var athleteId=params.get('athleteId');
  if(athleteId){var sel=document.getElementById('athleteId');if(Array.from(sel.options).some(function(o){return o.value===athleteId;})){sel.value=athleteId;sel.style.borderColor='var(--teal)';sel.style.background='#F0FAF9';}}
})();
</script>
</body>
</html>
