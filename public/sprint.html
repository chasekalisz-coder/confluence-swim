
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Confluence Swim — Sprint Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/charts.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/heic2any/0.0.4/heic2any.min.js"></script>
<style>
:root{--ink:#121212;--gold:#B8956A;--paper:#FAF9F6;--muted:#6B6B6B;--rule:#E8E4DD;--danger:#B84545;--teal:#2dd4bf;--navy:#0B1E38;--sprint:#7c3aed;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Inter",-apple-system,sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;}
.page{max-width:860px;margin:0 auto;padding:32px 20px 80px;}
h1{font-family:"Fraunces",serif;font-size:1.8rem;font-weight:600;margin:0 0 4px;}
.sub{color:var(--muted);font-size:.75rem;text-transform:uppercase;letter-spacing:.12em;margin-bottom:24px;}
.sub a{color:var(--sprint);text-decoration:none;font-weight:600;}
.badge{display:inline-block;background:var(--sprint);color:#fff;font-size:.65rem;padding:2px 8px;border-radius:4px;font-weight:600;letter-spacing:.06em;vertical-align:middle;margin-left:8px;}
.card{background:#fff;border:1px solid var(--rule);border-radius:4px;padding:20px;margin-bottom:16px;}
label{display:block;font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:5px;font-weight:600;}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--rule);border-radius:3px;font-size:.9rem;font-family:inherit;background:#fff;color:var(--ink);margin-bottom:12px;}
textarea{min-height:60px;resize:vertical;}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.pool-toggle{display:flex;gap:6px;margin-bottom:12px;}
.pool-btn{flex:1;padding:10px;border:2px solid var(--rule);background:#fff;color:var(--ink);font-size:.9rem;font-weight:600;cursor:pointer;border-radius:3px;}
.pool-btn.active{border-color:var(--sprint);background:var(--sprint);color:#fff;}
.photo-area{border:2px dashed var(--rule);border-radius:4px;padding:20px;text-align:center;margin-bottom:12px;cursor:pointer;}
.photo-area.ready{border-color:var(--teal);background:#F0FAF9;}
.photo-preview{max-width:200px;max-height:150px;border-radius:4px;margin-top:8px;}
.btn{padding:12px 20px;border:1px solid var(--rule);background:#fff;color:var(--ink);font-size:.8rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border-radius:3px;font-family:inherit;width:100%;}
.btn-sprint{background:var(--sprint);color:#fff;border-color:var(--sprint);font-size:.9rem;padding:14px;}
.btn-sprint:hover{background:#6d28d9;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-outline{background:transparent;}
.loading{text-align:center;padding:40px;color:var(--muted);}
.loading .spinner{width:32px;height:32px;border:3px solid var(--rule);border-top-color:var(--sprint);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}
/* Note rendering */
.note-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--rule);}
.note-logo{font-family:"Fraunces",serif;font-size:1.2rem;font-weight:600;}
.note-meta{text-align:right;font-size:.75rem;color:var(--muted);line-height:1.6;}
.athlete-block{margin-bottom:24px;}
.athlete-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:600;}
.athlete-name{font-family:"Fraunces",serif;font-size:2rem;font-weight:500;margin:4px 0 8px;}
.athlete-rule{width:40px;height:3px;background:var(--sprint);margin-bottom:8px;}
.section{display:flex;gap:24px;margin-bottom:28px;}
.section-num{font-family:"Fraunces",serif;font-size:2.2rem;font-weight:400;color:var(--rule);min-width:48px;text-align:right;line-height:1;}
.section-content{flex:1;}
.section-title{font-size:.68rem;text-transform:uppercase;letter-spacing:.15em;color:var(--sprint);font-weight:600;margin-bottom:10px;}
.section-content p{font-size:.92rem;line-height:1.7;margin-bottom:10px;}
.note-footer{display:flex;justify-content:space-between;font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;padding-top:16px;border-top:1px solid var(--rule);margin-top:32px;}
.workout-box{background:#fff;border:1px solid var(--rule);border-radius:4px;padding:16px 20px;margin-bottom:24px;}
.workout-box-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.15em;color:var(--sprint);font-weight:600;margin-bottom:10px;}
.wo-line{font-size:.88rem;line-height:1.7;padding:2px 0;}
.wo-label{display:inline-block;width:60px;font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600;vertical-align:top;}
.actions-bar{display:flex;gap:8px;margin-top:20px;}
.actions-bar .btn{width:auto;flex:1;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--ink);color:#fff;padding:14px 24px;border-radius:4px;font-size:.9rem;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:2000;transition:transform .25s;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.error{background:var(--danger);}
@media print{
  @page{size:letter portrait;margin:0.75in 0.5in;}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  .no-print,.actions-bar,.toast{display:none!important;}
  body{background:#fff!important;}
}
</style>
</head>
<body>
<div class="page">
  <div id="formView">
    <h1>Sprint Lab <span class="badge">BETA</span></h1>
    <div class="sub">Confluence Swim &middot; <a href="/">&larr; Back to athletes</a></div>

    <div class="card">
      <label>Athlete</label>
      <select id="athleteId"></select>
      <div class="row-2">
        <div><label>Date</label><input id="sessionDate" type="date" /></div>
        <div>
          <label>Pool</label>
          <div class="pool-toggle">
            <button type="button" class="pool-btn" onclick="setPool('SCY')">SCY</button>
            <button type="button" class="pool-btn" onclick="setPool('LCM')">LCM</button>
            <button type="button" class="pool-btn" onclick="setPool('SCM')">SCM</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <label>Workout Photo</label>
      <div class="photo-area" id="photoArea" onclick="document.getElementById('photo').click()">
        Click to upload photo of completed workout
        <input id="photo" type="file" accept="image/jpeg,image/png,image/heic,image/heif,.heic,.heif" style="display:none" />
      </div>
      <div id="photoStatus" style="font-size:.8rem;color:var(--muted);margin-bottom:8px;">No photo selected</div>
      <img id="photoPreview" class="photo-preview" style="display:none" />
    </div>

    <div class="card">
      <label>What went well?</label>
      <textarea id="wentWell" placeholder="What clicked today? What felt strong?"></textarea>
      <label>What needs work?</label>
      <textarea id="needsWork" placeholder="Where did things break down? What felt off?"></textarea>
      <label>Anything else Coach McEvoy should know?</label>
      <textarea id="coachNote" placeholder="Meet coming up, body feeling tired, want to focus on something specific..."></textarea>
    </div>

    <button class="btn btn-sprint" id="generateBtn" onclick="generateNote()">Generate Sprint Lab Note</button>
  </div>

  <div id="loadingView" style="display:none">
    <div class="loading">
      <div class="spinner"></div>
      <div>Coach McEvoy is analyzing your session...</div>
    </div>
  </div>

  <div id="noteView" style="display:none">
    <div id="noteRoot"></div>
    <div class="actions-bar no-print">
      <button class="btn btn-outline" onclick="window.print()">Print / Save PDF</button>
      <button class="btn btn-sprint" id="saveBtn" onclick="saveAndBack()">Save & Return</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>
</div>

<script src="/charts.js"></script>
<script>
var ATHLETES_DATA = [];
var selectedPool = null;
var photoBase64 = null;
var photoMediaType = null;
var generatedData = null;

function setPool(p) {
  selectedPool = p;
  document.querySelectorAll('.pool-btn').forEach(function(b) { b.classList.toggle('active', b.textContent === p); });
}

// Load athletes
(async function init() {
  document.getElementById('sessionDate').value = new Date().toISOString().split('T')[0];
  try {
    var res = await fetch('/api/db', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ action: 'listAthletes' }) });
    var data = await res.json();
    if (data.athletes) {
      ATHLETES_DATA = data.athletes.map(function(r) { return r.data || r; });
      var sel = document.getElementById('athleteId');
      ATHLETES_DATA.forEach(function(a) {
        var opt = document.createElement('option');
        opt.value = a.id;
        opt.textContent = (a.first || '') + ' ' + (a.last || '');
        sel.appendChild(opt);
      });
      var params = new URLSearchParams(window.location.search);
      var aid = params.get('athleteId');
      if (aid) sel.value = aid;
    }
  } catch(e) { console.warn('Failed to load athletes:', e); }
})();

// Photo handling
document.getElementById('photo').addEventListener('change', async function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var ext = file.name.split('.').pop().toLowerCase();
  var type = file.type.toLowerCase();
  var isHeic = type === 'image/heic' || type === 'image/heif' || ext === 'heic' || ext === 'heif';

  if (isHeic) {
    document.getElementById('photoStatus').textContent = 'Converting HEIC...';
    try {
      var blob = await heic2any({ blob: file, toType: 'image/jpeg', quality: 0.85 });
      if (Array.isArray(blob)) blob = blob[0];
      file = new File([blob], file.name.replace(/\.heic$/i, '.jpg'), { type: 'image/jpeg' });
    } catch(err) {
      document.getElementById('photoStatus').textContent = 'HEIC conversion failed: ' + err.message;
      return;
    }
  }

  var reader = new FileReader();
  reader.onload = function(ev) {
    var dataUrl = ev.target.result;
    photoBase64 = dataUrl.split(',')[1];
    photoMediaType = file.type || 'image/jpeg';
    document.getElementById('photoPreview').src = dataUrl;
    document.getElementById('photoPreview').style.display = 'block';
    document.getElementById('photoArea').classList.add('ready');
    document.getElementById('photoStatus').textContent = 'Photo ready';
  };
  reader.readAsDataURL(file);
});

async function generateNote() {
  if (!photoBase64) { showToast('Upload a workout photo first', true); return; }
  if (!selectedPool) { showToast('Select a pool type', true); return; }
  var athleteId = document.getElementById('athleteId').value;
  var athlete = ATHLETES_DATA.find(function(a) { return a.id === athleteId; });
  if (!athlete) { showToast('Select an athlete', true); return; }

  document.getElementById('formView').style.display = 'none';
  document.getElementById('loadingView').style.display = 'block';

  var btn = document.getElementById('generateBtn');
  btn.disabled = true;

  try {
    var res = await fetch('/api/generate-sprint-note', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        imageBase64: photoBase64,
        imageMediaType: photoMediaType,
        athlete: athlete,
        meta: { date: document.getElementById('sessionDate').value, poolType: selectedPool },
        feedback: {
          wentWell: document.getElementById('wentWell').value.trim() || null,
          needsWork: document.getElementById('needsWork').value.trim() || null,
          coachNote: document.getElementById('coachNote').value.trim() || null,
        }
      })
    });
    var data = await res.json();
    if (!res.ok || !data.ok) throw new Error(data.error || 'Generation failed');

    generatedData = data;
    generatedData.athleteId = athleteId;
    generatedData.date = document.getElementById('sessionDate').value;
    generatedData.poolType = selectedPool;
    renderNote(data, athlete);

    document.getElementById('loadingView').style.display = 'none';
    document.getElementById('noteView').style.display = 'block';

    // Set PDF filename
    var name = (athlete.first || '') + ' ' + (athlete.last || '');
    var parts = name.trim().split(' ');
    var d = new Date();
    var mm = String(d.getMonth()+1).padStart(2,'0');
    var dd = String(d.getDate()).padStart(2,'0');
    document.title = (parts[0]?parts[0].charAt(0):'') + '.' + (parts.slice(1).join(' ')||parts[0]) + ' ' + mm + '/' + dd + '/' + d.getFullYear();

  } catch(err) {
    showToast('Error: ' + err.message, true);
    document.getElementById('loadingView').style.display = 'none';
    document.getElementById('formView').style.display = 'block';
  }
  btn.disabled = false;
}

function renderNote(data, athlete) {
  var note = data.note || {};
  var athleteName = (athlete.first || '') + ' ' + (athlete.last || '');
  var dateStr = document.getElementById('sessionDate').value || '';

  var sections = [
    { num: '01', title: 'Session Overview', body: note.section_01 },
    { num: '02', title: 'The Science', body: note.section_02 },
    { num: '03', title: 'Your Results', body: note.section_03 },
    { num: '04', title: "Coach McEvoy's Feedback", body: note.section_04 },
    { num: '05', title: 'Next Steps', body: note.section_05 },
    { num: '06', title: 'Goal Tracker', body: note.section_06 },
  ];

  var sectionsHtml = sections.filter(function(s) { return s.body; }).map(function(s) {
    return '<div class="section"><div class="section-num">' + s.num + '</div><div class="section-content"><div class="section-title">' + s.title + '</div>' + renderProse(s.body) + '</div></div>';
  }).join('');

  // Charts from sprint data
  var chartsHtml = '';
  if (data.sprintData && data.sprintData.timedEfforts && data.sprintData.timedEfforts.length > 0) {
    var reps = data.sprintData.timedEfforts.map(function(t, i) {
      return { rep: t.round || (i+1), time: t.time, distance: t.distance };
    });
    var fakeData = { sets: [{ name: (data.sprintData.timedEfforts[0].stroke || '') + ' — Race Pace Work', reps: reps }] };
    if (typeof renderAllCharts === 'function') chartsHtml = renderAllCharts(fakeData);
  }

  // Build workout overview box from sprint data
  var workoutBox = '';
  if (data.sprintData && data.sprintData.structure) {
    var s = data.sprintData.structure;
    var lines = [];
    if (s.warmup) lines.push('<div class="wo-line"><span class="wo-label">Warmup</span>' + esc(s.warmup) + '</div>');
    if (s.preSet) lines.push('<div class="wo-line"><span class="wo-label">Pre-Set</span>' + esc(s.preSet) + '</div>');
    if (s.mainBlocks && s.mainBlocks.length > 0) {
      s.mainBlocks.forEach(function(b) {
        var detail = esc(b.name || '');
        if (b.equipment && b.equipment.length) detail += ' · ' + b.equipment.join(', ');
        if (b.resistance) detail += ' · ' + esc(b.resistance);
        if (b.tempo) detail += ' · ' + esc(b.tempo) + ' tempo';
        if (b.rest) detail += ' · ' + esc(b.rest);
        lines.push('<div class="wo-line"><span class="wo-label">Main</span>' + detail + '</div>');
      });
    }
    if (s.finishSet) lines.push('<div class="wo-line"><span class="wo-label">Finish</span>' + esc(s.finishSet) + '</div>');
    if (data.sprintData.timedEfforts && data.sprintData.timedEfforts.length > 0) {
      var times = data.sprintData.timedEfforts.map(function(t) { return 'R' + t.round + ': ' + t.time; }).join(' · ');
      lines.push('<div class="wo-line"><span class="wo-label">Times</span>' + times + '</div>');
    }
    if (lines.length > 0) {
      workoutBox = '<div class="workout-box"><div class="workout-box-label">Workout</div>' + lines.join('') + '</div>';
    }
  }

  function esc(str) { return str == null ? '' : String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  document.getElementById('noteRoot').innerHTML =
    '<div class="note-header"><div class="note-logo">Confluence Swim<br><span style="font-size:.6rem;color:var(--sprint);font-family:Inter,sans-serif;text-transform:uppercase;letter-spacing:.1em;">Sprint Lab</span></div><div class="note-meta"><div><strong>' + dateStr + '</strong></div><div>' + (selectedPool || '') + '</div><div>Robson & Lindley &middot; SMU</div></div></div>' +
    '<div class="athlete-block"><div class="athlete-label">Athlete</div><h2 class="athlete-name">' + athleteName + '</h2><div class="athlete-rule"></div><div style="font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;">Sprint/Power &middot; ' + (selectedPool||'') + '</div></div>' +
    workoutBox +
    sectionsHtml +
    chartsHtml +
    '<div class="note-footer"><div>confluencesport.com &middot; Dallas, TX</div><div>Athlete Use Only</div></div>';
}

function renderProse(text) {
  if (!text) return '';
  return text.split('\n').filter(function(p) { return p.trim(); }).map(function(p) { return '<p>' + p.trim() + '</p>'; }).join('');
}

async function saveAndBack() {
  if (!generatedData) return;
  var btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Saving...';

  var payload = {
    athleteId: generatedData.athleteId,
    date: generatedData.date,
    category: 'sprint',
    poolType: generatedData.poolType,
    note: generatedData.note,
    sprintData: generatedData.sprintData,
    rawModelOutput: generatedData.rawNoteText,
    model: generatedData.model,
    noteType: 'sprint',
  };

  try {
    var res = await fetch('/api/save-session', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    if (!res.ok) throw new Error('Save failed');
    showToast('Saved to Sprint Lab');
    setTimeout(function() { window.location.href = '/'; }, 1500);
  } catch(err) {
    showToast('Save failed: ' + err.message, true);
  }
  btn.disabled = false; btn.textContent = 'Save & Return';
}

function showToast(msg, isError) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.toggle('error', !!isError);
  t.classList.add('show'); setTimeout(function() { t.classList.remove('show'); }, 3800);
}
</script>
</body>
</html>
