
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Race Pace Calculator — Confluence Swim</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #06090f;
  --bg-card: rgba(12, 18, 30, 0.8);
  --bg-card-hover: rgba(18, 26, 42, 0.9);
  --border: rgba(148, 163, 184, 0.07);
  --border-active: rgba(0, 186, 230, 0.35);
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #475569;
  --accent: #00bae6;
  --accent-glow: rgba(0, 186, 230, 0.12);
  --green: #00e68a;
  --orange: #ff8c42;
  --red: #ff4757;
  --gold: #d4a853;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: 'DM Sans', -apple-system, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Background atmosphere */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: 
    radial-gradient(ellipse at 20% 0%, rgba(0, 186, 230, 0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(0, 230, 138, 0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: 
    linear-gradient(rgba(148,163,184,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(148,163,184,0.025) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 560px;
  margin: 0 auto;
  padding: 48px 20px 100px;
}

/* Header */
.header {
  margin-bottom: 48px;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}

.header-logo {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: linear-gradient(135deg, #1a2744, #0d1525);
  border: 1px solid rgba(212, 168, 83, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 1px;
}

.header-brand-text {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted);
  font-weight: 600;
}

.header h1 {
  font-size: 32px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.15;
  letter-spacing: -0.5px;
}

.header-desc {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 12px;
  line-height: 1.55;
}

.header-stat {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 14px;
  padding: 6px 12px;
  background: rgba(0, 186, 230, 0.06);
  border: 1px solid rgba(0, 186, 230, 0.12);
  border-radius: 20px;
  font-size: 11px;
  color: var(--accent);
  font-weight: 500;
}

.header-stat::before {
  content: '';
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
}

/* Selector sections */
.section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
}

.selector-group {
  margin-bottom: 24px;
}

.selector-row {
  display: flex;
  gap: 8px;
}

.selector-btn {
  flex: 1;
  padding: 13px 0;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
  text-transform: capitalize;
}

.selector-btn:hover {
  background: var(--bg-card-hover);
  border-color: rgba(148, 163, 184, 0.15);
}

.selector-btn.active {
  background: var(--accent-glow);
  border-color: var(--border-active);
  color: var(--accent);
}

/* Event buttons */
.event-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.event-btn {
  padding: 9px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}

.event-btn:hover {
  background: var(--bg-card-hover);
  border-color: rgba(148, 163, 184, 0.15);
}

.event-btn.active {
  background: var(--accent-glow);
  border-color: var(--border-active);
  color: var(--accent);
}

/* Goal time input */
.time-input-row {
  display: flex;
  gap: 10px;
  align-items: stretch;
  margin-bottom: 28px;
}

.time-input {
  flex: 1;
  padding: 15px 18px;
  background: rgba(8, 12, 22, 0.9);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  font-size: 20px;
  font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 2px;
  outline: none;
  transition: border-color 0.2s;
}

.time-input:focus {
  border-color: var(--border-active);
}

.time-input::placeholder {
  color: #334155;
  font-size: 16px;
  letter-spacing: 1px;
}

.generate-btn {
  padding: 15px 28px;
  background: linear-gradient(135deg, rgba(0,186,230,0.15), rgba(0,230,138,0.1));
  border: 1px solid rgba(0, 186, 230, 0.2);
  border-radius: 8px;
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 700;
  cursor: default;
  transition: all 0.3s;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.5px;
}

.generate-btn.ready {
  background: linear-gradient(135deg, #00bae6, #00e68a);
  border-color: transparent;
  color: #06090f;
  cursor: pointer;
  box-shadow: 0 0 30px rgba(0, 186, 230, 0.2);
}

.generate-btn.ready:hover {
  box-shadow: 0 0 40px rgba(0, 186, 230, 0.3);
  transform: translateY(-1px);
}

/* Results */
.results {
  animation: slideUp 0.45s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Results header */
.results-header {
  background: linear-gradient(135deg, rgba(0,186,230,0.07), rgba(0,230,138,0.04));
  border: 1px solid rgba(0, 186, 230, 0.1);
  border-radius: 14px;
  padding: 22px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.results-event {
  font-size: 22px;
  font-weight: 700;
  color: var(--text-primary);
}

.results-meta {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 3px;
}

.results-goal {
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 1px;
}

.results-goal-label {
  font-size: 9px;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-align: right;
  margin-top: 2px;
}

/* Section markers */
.section-marker {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 28px 0 14px;
}

.section-marker-bar {
  width: 3px;
  height: 18px;
  border-radius: 2px;
}

.section-marker-text {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-secondary);
}

/* Split table */
.split-table {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.split-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 13px 20px;
  border-bottom: 1px solid rgba(148, 163, 184, 0.04);
}

.split-row:last-child { border-bottom: none; }

.split-row.first {
  background: rgba(0, 186, 230, 0.03);
}

.split-label {
  font-size: 12px;
  color: var(--text-secondary);
  font-family: 'JetBrains Mono', monospace;
  min-width: 55px;
}

.split-time {
  font-size: 17px;
  font-weight: 600;
  color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 1px;
}

.split-pct {
  font-size: 10px;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
  min-width: 50px;
  text-align: right;
}

/* Chart */
.chart-container {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 32px 20px 18px;
  margin-top: 8px;
  position: relative;
}

.chart-container::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 80px;
  background: radial-gradient(ellipse at 50% 0%, rgba(0,186,230,0.04) 0%, transparent 70%);
  pointer-events: none;
}

.chart-bars {
  display: flex;
  align-items: flex-end;
  height: 170px;
  position: relative;
  z-index: 1;
}

.chart-bar-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}

.chart-bar-time {
  font-size: 10px;
  color: var(--text-primary);
  font-weight: 500;
  font-family: 'JetBrains Mono', monospace;
}

.chart-bar {
  width: 85%;
  border-radius: 4px 4px 2px 2px;
  transition: height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
}

.chart-bar-label {
  font-size: 8px;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
  margin-top: 4px;
}

.chart-avg {
  display: flex;
  justify-content: flex-end;
  margin-top: 14px;
  padding-top: 10px;
  border-top: 1px dashed rgba(148, 163, 184, 0.1);
  position: relative;
  z-index: 1;
}

.chart-avg-text {
  font-size: 10px;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
}

/* Go-out indicator */
.indicator {
  margin-top: 16px;
  border-radius: 10px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.indicator-goout {
  background: rgba(0, 186, 230, 0.05);
  border: 1px solid rgba(0, 186, 230, 0.12);
}

.indicator-danger {
  background: rgba(255, 140, 66, 0.05);
  border: 1px solid rgba(255, 140, 66, 0.12);
}

.indicator-circle {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  flex-shrink: 0;
}

.indicator-goout .indicator-circle {
  background: rgba(0, 186, 230, 0.08);
  border: 2px solid rgba(0, 186, 230, 0.25);
  color: var(--accent);
}

.indicator-danger .indicator-circle {
  background: rgba(255, 140, 66, 0.08);
  border: 2px solid rgba(255, 140, 66, 0.25);
  color: var(--orange);
  font-size: 18px;
}

.indicator-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
}

.indicator-desc {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 3px;
  line-height: 1.4;
}

/* Practice pace */
.pace-row {
  display: flex;
  gap: 12px;
  margin-top: 8px;
}

.pace-card {
  flex: 1;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
  text-align: center;
}

.pace-label {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.pace-value {
  font-size: 22px;
  font-weight: 700;
  color: var(--text-primary);
  font-family: 'JetBrains Mono', monospace;
}

/* Insight card */
.insight-card {
  margin-top: 28px;
  background: rgba(12, 18, 30, 0.5);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 22px;
}

.insight-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
}

.insight-text {
  font-size: 13px;
  color: #b8c5d4;
  line-height: 1.65;
}

/* IM notice */
.im-notice {
  margin-top: 32px;
  padding: 14px 18px;
  background: rgba(12, 18, 30, 0.3);
  border-radius: 8px;
  border: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.5;
}

/* Footer */
.footer {
  margin-top: 64px;
  text-align: center;
  font-size: 10px;
  color: #1e293b;
  letter-spacing: 2px;
}

/* Back link */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--text-muted);
  text-decoration: none;
  font-size: 12px;
  font-weight: 500;
  margin-bottom: 32px;
  transition: color 0.2s;
}

.back-link:hover { color: var(--text-secondary); }

@media (max-width: 480px) {
  .container { padding: 32px 16px 80px; }
  .header h1 { font-size: 26px; }
  .results-goal { font-size: 22px; }
  .chart-bar-time { font-size: 8px; }
}
</style>
</head>

const INSIGHTS = {
  "50 Free":"Pure speed. The second 25 is always slower — reaction time and dive momentum make the first 25 disproportionately fast.",
  "100 Free":"Freestyle is the second most evenly-split 100. The back half is about holding speed, not building it.",
  "100 Fly":"Butterfly has the largest front-to-back drop of any 100. The first 50 accounts for less than 47% of the total — the second 50 is where the race is survived.",
  "100 Back":"Backstroke is the most evenly-split 100. The difference between the first and second 50 is smaller than any other stroke.",
  "100 Breast":"Breaststroke has the second-largest front-to-back drop. The wall and pullout on the second 50 can't overcome the momentum lost in the stroke cycle.",
  "200 Free":"The 200 free rewards patience. The first 50 is always the fastest, but the difference between splits 2-4 is minimal — the race is about holding, not surging.",
  "200 Fly":"The 200 fly has the largest deceleration of any 200. The 3rd 50 is where the race separates — everyone slows, but how much determines the finish. The goal isn't even-splitting. It's minimizing fade.",
  "200 Back":"The most evenly-paced 200. Positions barely change from the halfway point. Where you are at 100 is where you'll finish — build your race from the front.",
  "200 Breast":"Breaststroke has a significant build through the race — each 50 is progressively slower. The last 50 carries the largest percentage of any 200 event.",
  "500 Free":"The 500 follows a U-curve: go out, settle into the middle, close the last 100. The fastest and slowest 50s are the first and last — everything in between should be metronomic.",
  "400 Free":"The 400 free punishes overextension. The first 50 is fast off the start, then the middle 300 should be controlled and steady. Save the close for the last 100.",
  "800 Free":"The 800 is about rhythm. After the opening 100, the middle 600 should be remarkably consistent — within tenths per 100. The close comes in the final 100.",
  "1500 Free":"The mile is three distinct phases: establish pace in the first 500, hold through the second 500, and close the third 500. The elite pattern is remarkably even across all three.",
  "1650 Free":"The mile is three distinct phases: establish pace in the first 500, hold through the second 500, and close the final 500 + 150. Rhythm and consistency win this race."
};

const DANGER_SPLITS = {"200 Fly":3};

const COURSE_FULL = {scy:'Short Course Yards',lcm:'Long Course Meters',scm:'Short Course Meters'};

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let state = { course:'scy', gender:'men', event:'', goalTime:'' };

// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════
function parseTime(s) {
  if (!s) return null;
  s = s.trim().replace(/[^\d:.]/g,'');
  if (s.includes(':')) { const p=s.split(':'); return parseFloat(p[0])*60+parseFloat(p[1]); }
  return parseFloat(s);
}

function fmtTime(s) {
  if (s>=60) { const m=Math.floor(s/60), sc=(s%60).toFixed(2); return m+':'+sc.padStart(5,'0'); }
  return s.toFixed(2);
}

function fmtPace(s) {
  if (s>=60) { const m=Math.floor(s/60), sc=(s%60).toFixed(1); return m+':'+sc.padStart(4,'0'); }
  return s.toFixed(1);
}

function barColor(pct, min, max, idx) {
  if (idx===0) return 'rgba(0, 186, 230, 0.85)';
  const r=(pct-min)/(max-min||1);
  if (r<0.3) return 'rgba(0, 230, 138, 0.7)';
  if (r<0.6) return 'rgba(255, 200, 0, 0.65)';
  if (r<0.85) return 'rgba(255, 140, 66, 0.7)';
  return 'rgba(255, 71, 87, 0.75)';
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function setCourse(c) {
  state.course=c; state.event='';
  document.querySelectorAll('[data-course]').forEach(b=>{b.classList.toggle('active',b.dataset.course===c);});
  renderEvents();
  clearResults();
}

function setGender(g) {
  state.gender=g; state.event='';
  document.querySelectorAll('[data-gender]').forEach(b=>{b.classList.toggle('active',b.dataset.gender===g);});
  renderEvents();
  clearResults();
}

function setEvent(e) {
  state.event=e;
  document.querySelectorAll('.event-btn').forEach(b=>{b.classList.toggle('active',b.textContent===e);});
  clearResults();
  updateGenBtn();
}

function renderEvents() {
  const grid=document.getElementById('eventGrid');
  const events=Object.keys(D[state.course]?.[state.gender]||{});
  grid.innerHTML=events.map(e=>`<button class="event-btn" onclick="setEvent('${e}')">${e}</button>`).join('');
}

function clearResults() {
  document.getElementById('resultsContainer').innerHTML='';
}

function getGoalSeconds() {
  const m = document.getElementById('goalMin').value.trim();
  const s = document.getElementById('goalSec').value.trim();
  if (!s) return null;
  const min = m ? parseFloat(m) : 0;
  const sec = parseFloat(s);
  if (isNaN(sec)) return null;
  if (isNaN(min)) return null;
  return min * 60 + sec;
}

function updateGenBtn() {
  const btn=document.getElementById('generateBtn');
  const seconds=getGoalSeconds();
  const ready=state.event && seconds && seconds>0;
  btn.classList.toggle('ready',ready);
}

function generate() {
  const seconds=getGoalSeconds();
  if (!state.event||!seconds||seconds<=0) return;
  
  const pcts=D[state.course]?.[state.gender]?.[state.event];
  if (!pcts) return;

  let html='<div class="results">';
  
  // Header
  html+=`<div class="results-header">
    <div><div class="results-event">${state.event}</div><div class="results-meta">${COURSE_FULL[state.course]} · ${state.gender==='men'?'Men':'Women'}</div></div>
    <div style="text-align:right"><div class="results-goal">${fmtTime(seconds)}</div><div class="results-goal-label">GOAL TIME</div></div>
  </div>`;

  // Process each split level
  for (const [key, vals] of Object.entries(pcts)) {
    const label=key.replace('_','');
    const unit=label.replace('s','');
    const splits=vals.map((p,i)=>({pct:p, time:seconds*p/100}));
    const maxP=Math.max(...vals);
    const minP=Math.min(...vals);
    const avg=seconds/splits.length;

    // Split table
    html+=`<div class="section-marker"><div class="section-marker-bar" style="background:linear-gradient(180deg,#00e68a,#00bae6)"></div><span class="section-marker-text">Target Splits — per ${unit}</span></div>`;
    html+=`<div class="split-table">`;
    splits.forEach((s,i)=>{
      html+=`<div class="split-row${i===0?' first':''}">
        <span class="split-label">${label}#${i+1}</span>
        <span class="split-time">${fmtTime(s.time)}</span>
        <span class="split-pct">${s.pct.toFixed(1)}%</span>
      </div>`;
    });
    html+=`</div>`;

    // Chart — split into two rows if more than 10 bars
    const avgPct = 100 / splits.length;
    const avgH = 30+(avgPct/maxP)*105;
    const twoRows = splits.length > 10;
    const halfIdx = twoRows ? Math.ceil(splits.length / 2) : splits.length;
    
    html+=`<div class="chart-container">`;
    
    // Row 1
    html+=`<div class="chart-bars" style="position:relative">`;
    html+=`<div style="position:absolute;left:0;right:0;bottom:${avgH}px;border-top:2px dashed rgba(0,186,230,0.45);z-index:2;pointer-events:none"><span style="position:absolute;right:0;top:-16px;font-size:9px;color:rgba(0,186,230,0.7);font-weight:600;font-family:'JetBrains Mono',monospace">AVG</span></div>`;
    splits.slice(0, halfIdx).forEach((s,i)=>{
      const h=30+(s.pct/maxP)*105;
      const c=barColor(s.pct,minP,maxP,i);
      const fontSize = twoRows ? 8 : 10;
      const labelSize = twoRows ? 7 : 8;
      html+=`<div class="chart-bar-col">
        <span class="chart-bar-time" style="font-size:${fontSize}px">${fmtTime(s.time)}</span>
        <div class="chart-bar" data-h="${h}" style="height:0px;background:${c};box-shadow:0 0 14px ${c.replace(/[\d.]+\)$/,'0.2)'}};transition:height 0.6s cubic-bezier(0.34,1.56,0.64,1)"></div>
        <span class="chart-bar-label" style="font-size:${labelSize}px">${label}#${i+1}</span>
      </div>`;
    });
    html+=`</div>`;
    
    // Row 2 (if needed)
    if (twoRows) {
      html+=`<div class="chart-bars" style="position:relative;margin-top:20px">`;
      html+=`<div style="position:absolute;left:0;right:0;bottom:${avgH}px;border-top:2px dashed rgba(0,186,230,0.45);z-index:2;pointer-events:none"></div>`;
      splits.slice(halfIdx).forEach((s,i)=>{
        const h=30+(s.pct/maxP)*105;
        const c=barColor(s.pct,minP,maxP,i+halfIdx);
        html+=`<div class="chart-bar-col">
          <span class="chart-bar-time" style="font-size:8px">${fmtTime(s.time)}</span>
          <div class="chart-bar" data-h="${h}" style="height:0px;background:${c};box-shadow:0 0 14px ${c.replace(/[\d.]+\)$/,'0.2)'}};transition:height 0.6s cubic-bezier(0.34,1.56,0.64,1)"></div>
          <span class="chart-bar-label" style="font-size:7px">${label}#${i+halfIdx+1}</span>
        </div>`;
      });
      html+=`</div>`;
    }
    
    html+=`<div class="chart-avg"><span class="chart-avg-text">AVG ${fmtTime(avg)}/${unit}</span></div></div>`;

    // Go-out speed
    if (splits.length>=2) {
      const delta=(avg-splits[0].time).toFixed(1);
      html+=`<div class="indicator indicator-goout">
        <div class="indicator-circle">${delta}</div>
        <div><div class="indicator-title">Go-Out Speed</div>
        <div class="indicator-desc">First ${unit} is ${delta}s faster than your average ${unit.toLowerCase()} pace</div></div>
      </div>`;
    }
  }

  // Danger split
  if (DANGER_SPLITS[state.event]) {
    const d=DANGER_SPLITS[state.event];
    html+=`<div class="indicator indicator-danger">
      <div class="indicator-circle">!</div>
      <div><div class="indicator-title">Critical Split</div>
      <div class="indicator-desc">Split #${d} is where the race separates. Biggest deceleration point — hold here and the back half takes care of itself.</div></div>
    </div>`;
  }

  // Practice pace
  const dist=parseInt(state.event);
  if (dist && dist>=100) {
    let p50, p100;
    if (state.event.includes('1650')) { p50=seconds/33; p100=seconds/16.5; }
    else if (state.event.includes('1500')) { p50=seconds/30; p100=seconds/15; }
    else if (state.event.includes('800')) { p50=seconds/16; p100=seconds/8; }
    else { p50=seconds/(dist/50); p100=seconds/(dist/100); }
    
    html+=`<div class="section-marker"><div class="section-marker-bar" style="background:linear-gradient(180deg,#a78bfa,#818cf8)"></div><span class="section-marker-text">Practice Pace</span></div>`;
    html+=`<div class="pace-row">`;
    if (p50) html+=`<div class="pace-card"><div class="pace-label">Avg /50</div><div class="pace-value">${fmtPace(p50)}</div></div>`;
    if (p100) html+=`<div class="pace-card"><div class="pace-label">Avg /100</div><div class="pace-value">${fmtPace(p100)}</div></div>`;
    html+=`</div>`;
  }

  // Insight
  if (INSIGHTS[state.event]) {
    html+=`<div class="insight-card"><div class="insight-label">Race Intelligence</div><div class="insight-text">${INSIGHTS[state.event]}</div></div>`;
  }

  // IM notice
  html+=`<div class="im-notice">Individual Medley events are currently in development and will be available in a future update.</div>`;

  html+=`</div>`;

  document.getElementById('resultsContainer').innerHTML=html;
  document.getElementById('resultsContainer').scrollIntoView({behavior:'smooth',block:'start'});
  
  // Animate bars when they scroll into view
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const bars = entry.target.querySelectorAll('.chart-bar[data-h]');
        bars.forEach((bar, i) => {
          setTimeout(() => {
            bar.style.height = bar.dataset.h + 'px';
          }, i * 40);
        });
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.2 });
  
  document.querySelectorAll('.chart-container').forEach(c => observer.observe(c));
}

// Init
document.getElementById('goalMin').addEventListener('input', function(e) {
  this.value = this.value.replace(/[^\d]/g, '');
  updateGenBtn();
  if (this.value.length >= 1) document.getElementById('goalSec').focus();
});
document.getElementById('goalSec').addEventListener('input', function(e) {
  this.value = this.value.replace(/[^\d.]/g, '');
  updateGenBtn();
});
document.getElementById('goalSec').addEventListener('keydown', e=>{if(e.key==='Enter')generate();});
document.getElementById('goalMin').addEventListener('keydown', e=>{if(e.key==='Enter')generate();});
document.getElementById('goalMin').addEventListener('focus', ()=>{document.getElementById('timeInputWrap').style.borderColor='rgba(0,186,230,0.35)';});
document.getElementById('goalMin').addEventListener('blur', ()=>{document.getElementById('timeInputWrap').style.borderColor='';});
document.getElementById('goalSec').addEventListener('focus', ()=>{document.getElementById('timeInputWrap').style.borderColor='rgba(0,186,230,0.35)';});
document.getElementById('goalSec').addEventListener('blur', ()=>{document.getElementById('timeInputWrap').style.borderColor='';});
renderEvents();
</script>
