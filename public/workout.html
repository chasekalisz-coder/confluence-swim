<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="/auth-guard.js"></script>
<title>Confluence Swim — Workout Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root {
  --ink: #f1f5f9;
  --gold: #D4A853;
  --paper: #06080F;
  --muted: #64748b;
  --rule: rgba(255, 255, 255, 0.06);
  --rule-strong: rgba(255, 255, 255, 0.1);
  --surface: rgba(255, 255, 255, 0.025);
  --surface-input: rgba(255, 255, 255, 0.04);
  --danger: #f87171;
  --teal: #2dd4bf;
  --teal-bright: #5eead4;
  --teal-light: #99f6e4;
  --navy: #0B1E38;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  position: relative;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  top: -200px;
  right: -200px;
  width: 800px;
  height: 800px;
  background: radial-gradient(circle, rgba(45, 212, 191, 0.14) 0%, rgba(45, 212, 191, 0.04) 35%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}
body > * { position: relative; z-index: 1; }

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 24px;
  border-bottom: 0.5px solid var(--rule);
  background: rgba(0, 0, 0, 0.4);
}
.topbar .brand {
  display: flex;
  align-items: center;
  text-decoration: none;
  transition: opacity 0.15s;
}
.topbar .brand:hover { opacity: 0.85; }
.topbar .brand img {
  height: 22px;
  width: auto;
  display: block;
}
.topbar .crumb { font-size: 10px; color: var(--muted); letter-spacing: 0.05em; }

.builder { max-width: 860px; margin: 0 auto; padding: 32px 24px 80px; }

.hero { margin-bottom: 32px; }
.beta-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  background: rgba(45, 212, 191, 0.08);
  border: 0.5px solid rgba(45, 212, 191, 0.25);
  border-radius: 100px;
  margin-bottom: 16px;
}
.beta-pill .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--teal);
  box-shadow: 0 0 12px rgba(45, 212, 191, 0.7);
}
.beta-pill .label {
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--teal-light);
  font-weight: 600;
  text-transform: uppercase;
}
h1.page-title {
  font-family: 'Fraunces', serif;
  font-size: 40px;
  font-weight: 400;
  color: white;
  line-height: 1.05;
  margin-bottom: 12px;
  letter-spacing: -0.02em;
}
.hero-sub {
  font-size: 13px;
  color: #94a3b8;
  max-width: 460px;
  line-height: 1.6;
}

.page-sub { display: none; }

label {
  display: block;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--gold);
  margin-bottom: 6px;
  font-weight: 700;
}

input, select, textarea {
  width: 100%;
  padding: 10px 12px;
  background: var(--surface-input);
  border: 0.5px solid var(--rule-strong);
  border-radius: 8px;
  font-size: 13px;
  color: white;
  font-family: inherit;
  margin-bottom: 10px;
  appearance: none;
  -webkit-appearance: none;
}
select {
  background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'%3E%3Cpath d='M2 4l3 3 3-3' stroke='%2364748b' fill='none' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 12px center;
  padding-right: 32px;
  cursor: pointer;
}
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: rgba(45, 212, 191, 0.5);
}
input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
textarea {
  min-height: 56px;
  resize: vertical;
  line-height: 1.5;
}
textarea::placeholder { color: #475569; font-style: italic; }
input::placeholder { color: #475569; }

.card {
  background: var(--surface);
  border: 0.5px solid var(--rule);
  border-radius: 12px;
  padding: 20px 22px;
  margin-bottom: 16px;
}

.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.pool-toggle {
  display: flex;
  gap: 0;
  background: var(--surface-input);
  border: 0.5px solid var(--rule-strong);
  padding: 3px;
  border-radius: 8px;
  margin-bottom: 4px;
}
.pool-btn {
  flex: 1;
  padding: 10px 4px;
  background: transparent;
  border: 0;
  color: var(--muted);
  font-size: 12px;
  font-weight: 500;
  text-align: center;
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s, color 0.15s;
}
.pool-btn.active {
  background: rgba(45, 212, 191, 0.18);
  color: var(--teal-light);
  font-weight: 600;
}

.section-card {
  background: var(--surface);
  border: 0.5px solid var(--rule);
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
}
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 22px;
  background: rgba(45, 212, 191, 0.06);
  border-bottom: 0.5px solid rgba(45, 212, 191, 0.15);
  color: white;
  cursor: pointer;
  user-select: none;
}
.section-header:hover { background: rgba(45, 212, 191, 0.1); }
.section-header h3 {
  font-family: 'Fraunces', serif;
  font-size: 16px;
  font-weight: 500;
  margin: 0;
  color: white;
}
.section-header span:last-child {
  font-size: 11px;
  color: var(--teal);
  opacity: 0.7;
}
.section-body { padding: 18px 22px; }

.entry {
  background: rgba(0, 0, 0, 0.3);
  border: 0.5px solid var(--rule);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 10px;
  position: relative;
}
.entry-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: end;
}
.entry-row > div { min-width: 70px; }
.entry-row .sm { max-width: 80px; flex: 0 0 80px; }
.entry-row .md { max-width: 130px; flex: 0 0 130px; }
.entry-row .grow { flex: 1; }
.entry-row label {
  font-size: 9px;
  letter-spacing: 0.1em;
  margin-bottom: 4px;
}
.entry-row input, .entry-row select {
  margin-bottom: 0;
  padding: 8px 10px;
  font-size: 12px;
}
.remove-entry {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(248, 113, 113, 0.08);
  border: 0;
  color: var(--muted);
  cursor: pointer;
  font-size: 14px;
  width: 22px;
  height: 22px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.remove-entry:hover { color: var(--danger); background: rgba(248, 113, 113, 0.18); }

.add-entry-btn {
  width: 100%;
  padding: 12px;
  background: rgba(45, 212, 191, 0.04);
  border: 1px dashed rgba(45, 212, 191, 0.3);
  color: var(--teal-light);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.04em;
  cursor: pointer;
  border-radius: 8px;
  font-family: inherit;
  margin-top: 4px;
  transition: background 0.15s, border-color 0.15s;
}
.add-entry-btn:hover {
  background: rgba(45, 212, 191, 0.08);
  border-color: rgba(45, 212, 191, 0.5);
}

.equip-row { display: flex; flex-wrap: wrap; gap: 4px; margin: 8px 0; }
.equip-chip {
  padding: 5px 11px;
  background: rgba(255, 255, 255, 0.04);
  border: 0.5px solid var(--rule-strong);
  border-radius: 14px;
  font-size: 11px;
  cursor: pointer;
  user-select: none;
  font-weight: 500;
  color: var(--muted);
  transition: all 0.15s;
}
.equip-chip:hover { color: white; border-color: rgba(255, 255, 255, 0.2); }
.equip-chip.on {
  background: rgba(45, 212, 191, 0.18);
  color: var(--teal-light);
  border-color: rgba(45, 212, 191, 0.4);
}

.time-toggle {
  display: flex;
  gap: 14px;
  align-items: center;
  margin-top: 8px;
  font-size: 11px;
  color: var(--muted);
}
.time-toggle label {
  font-size: 11px;
  letter-spacing: 0;
  text-transform: none;
  color: var(--muted);
  margin-bottom: 0;
  font-weight: 500;
}
.time-toggle input[type=checkbox] {
  width: auto;
  margin: 0 4px 0 0;
  accent-color: var(--teal);
}

.totals-bar {
  background: rgba(45, 212, 191, 0.06);
  border: 0.5px solid rgba(45, 212, 191, 0.2);
  border-radius: 12px;
  padding: 18px 22px;
  margin: 24px 0 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.totals-bar .total-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--gold);
  font-weight: 700;
}
.totals-bar .total-num {
  font-family: 'Fraunces', serif;
  font-size: 28px;
  font-weight: 500;
  color: white;
  letter-spacing: -0.02em;
}

.quote-bar {
  background: var(--surface);
  border: 0.5px solid var(--rule);
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.quote-text {
  flex: 1;
  font-family: 'Fraunces', serif;
  font-size: 14px;
  font-style: italic;
  color: #cbd5e1;
  line-height: 1.55;
}
.quote-btn {
  padding: 7px 14px;
  border: 0.5px solid var(--rule-strong);
  background: var(--surface-input);
  color: var(--muted);
  font-size: 10px;
  font-weight: 600;
  cursor: pointer;
  border-radius: 6px;
  white-space: nowrap;
  font-family: inherit;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  transition: color 0.15s, border-color 0.15s;
}
.quote-btn:hover { color: var(--teal-light); border-color: rgba(45, 212, 191, 0.4); }

.actions { display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; }

.btn {
  padding: 12px 22px;
  border: 0.5px solid var(--rule-strong);
  background: var(--surface-input);
  color: white;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.04em;
  cursor: pointer;
  border-radius: 10px;
  font-family: inherit;
  transition: background 0.15s, border-color 0.15s;
}
.btn:hover { background: rgba(255, 255, 255, 0.06); border-color: rgba(255, 255, 255, 0.18); }
.btn-primary {
  background: linear-gradient(180deg, #5eead4 0%, #2dd4bf 100%);
  border-color: transparent;
  color: #042f2e;
  font-weight: 600;
  box-shadow: 0 4px 16px rgba(45, 212, 191, 0.25);
}
.btn-primary:hover {
  background: linear-gradient(180deg, #5eead4 0%, #2dd4bf 100%);
  box-shadow: 0 6px 20px rgba(45, 212, 191, 0.4);
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.save-section {
  background: var(--surface);
  border: 0.5px solid var(--rule);
  border-radius: 12px;
  padding: 20px 22px;
  margin-bottom: 20px;
}

.athlete-checks {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 8px 0 16px;
}
.athlete-check {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  background: var(--surface-input);
  border: 0.5px solid var(--rule-strong);
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
  color: #cbd5e1;
  transition: all 0.15s;
}
.athlete-check:hover { border-color: rgba(255, 255, 255, 0.15); }
.athlete-check.selected {
  background: rgba(45, 212, 191, 0.12);
  border-color: rgba(45, 212, 191, 0.4);
  color: var(--teal-light);
}
.athlete-check input {
  width: auto;
  margin: 0;
  accent-color: var(--teal);
}

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #0f172a;
  color: white;
  padding: 12px 20px;
  border: 0.5px solid var(--rule-strong);
  border-radius: 10px;
  font-size: 13px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
  z-index: 2000;
  transition: transform 0.25s ease;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { border-color: rgba(248, 113, 113, 0.4); color: #fca5a5; }

@media (max-width: 640px) {
  .topbar { padding: 12px 18px; }
  .topbar .brand img { height: 18px; }
  .builder { padding: 20px 16px 80px; }
  h1.page-title { font-size: 28px; }
  .hero-sub { font-size: 12px; }
  .card, .save-section { padding: 16px 18px; }
  .row-2 { grid-template-columns: 1fr; gap: 8px; }
  .section-header { padding: 14px 18px; }
  .section-body { padding: 14px 18px; }
  .entry-row .sm { flex: 1 1 calc(50% - 5px); max-width: none; }
  .entry-row .md { flex: 1 1 calc(50% - 5px); max-width: none; }
  .totals-bar { padding: 14px 18px; }
  .totals-bar .total-num { font-size: 22px; }
  .quote-bar { flex-direction: column; align-items: stretch; gap: 10px; }
  .actions .btn { flex: 1; min-width: 0; }
}
/* ============================================================
   ADMIN BOTTOM NAV — appended to all standalone tool pages
   Mirrors the .agp-tabbar styles from src/styles/main.css.
   Mobile-only (≤640px). Tools tab is pre-active since user
   is currently using a tool. Links go to "/", "/#tools",
   "/#settings". AthleteGrid.jsx reads the hash on mount
   and on hashchange to land on the right tab.
   ============================================================ */
/* Hidden by default; only shown on mobile */
.cs-tabbar { display: none; }
@media (max-width: 640px) {
  .cs-tabbar {
    display: flex;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(10, 14, 26, 0.96);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 0.5px solid rgba(255,255,255,0.08);
    padding: 6px 0 calc(6px + env(safe-area-inset-bottom, 0px));
    z-index: 40;
  }
  .cs-tab {
    flex: 1;
    background: none;
    border: 0;
    padding: 8px 4px;
    color: #64748b;
    font-size: 10px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    font-family: inherit;
    text-decoration: none;
    transition: color 0.15s;
  }
  .cs-tab:hover { color: #94a3b8; }
  .cs-tab-icon { font-size: 18px; line-height: 1; }
  .cs-tab-label { font-size: 10px; }
  .cs-tab-active { color: #D4A853; }
  .cs-tab-active:hover { color: #D4A853; }
  /* Bottom padding on body so content isn't hidden behind nav */
  body { padding-bottom: 70px; }
}
@media print {
  .cs-tabbar { display: none !important; }
}

</style>
</head>
<body>
<div class="topbar">
  <a href="/" class="brand"><img src="/assets/confluence-swim-white.png" alt="Confluence Swim" /></a>
  <div class="crumb">Workout Builder</div>
</div>

<div class="builder">
  <div class="hero">
    <div class="beta-pill">
      <span class="dot"></span>
      <span class="label">Workout Builder</span>
    </div>
    <h1 class="page-title">Build the set.</h1>
    <div class="hero-sub">Design a workout, total the yardage, and push it to as many athletes as you want.</div>
  </div>

  <div class="page-sub">Confluence Swim &middot; <a href="/">&larr; Back to athletes</a></div>

  <div class="card">
    <div class="row-2">
      <div><label>Workout Title (optional)</label><input id="workoutTitle" type="text" placeholder="e.g., Tuesday AM Quality Fly" /></div>
      <div><label>Date</label><input id="workoutDate" type="date" /></div>
    </div>
    <label>Pool</label>
    <div class="pool-toggle">
      <button type="button" class="pool-btn" data-pool="SCY" onclick="setPool('SCY')">SCY</button>
      <button type="button" class="pool-btn" data-pool="LCM" onclick="setPool('LCM')">LCM</button>
    </div>
  </div>
  <div id="sectionsContainer"></div>
  <div class="totals-bar">
    <div><div class="total-label">Total Yardage</div></div>
    <div class="total-num" id="grandTotal">0</div>
  </div>
  <div class="quote-bar">
    <div class="quote-text" id="quoteText"></div>
    <button class="quote-btn" onclick="nextQuote()">New Quote</button>
  </div>
  <div class="save-section">
    <label>Save to athletes</label>
    <div class="athlete-checks" id="athleteChecks"></div>
    <div class="actions">
      <button class="btn" onclick="downloadDoc()" id="downloadBtn">Download Word Doc</button>
      <button class="btn btn-primary" onclick="saveWorkout()" id="saveBtn">Save to Selected Athletes</button>
    </div>
  </div>
  <div id="toast" class="toast"></div>
</div>

var selectedPool=null;
var quoteIndex=Math.floor(Math.random()*QUOTES.length);
function setPool(p){selectedPool=p;document.querySelectorAll('.pool-btn').forEach(function(b){b.classList.toggle('active',b.dataset.pool===p)});}
(function init(){
  document.getElementById('workoutDate').value=new Date().toISOString().split('T')[0];
  SECTIONS.forEach(function(s){
    var html='<div class="section-card"><div class="section-header" onclick="toggleSection(\''+s.id+'\')"><h3>'+s.label+' <span id="sYd_'+s.id+'" style="margin-left:8px;font-size:.75rem;color:var(--gold);font-weight:600;">0 yds</span></h3><span style="font-size:.8rem;">&#x25BC;</span></div><div class="section-body" id="sBody_'+s.id+'"><div style="margin-bottom:12px;"><label>Section Title (optional)</label><input type="text" id="sTitle_'+s.id+'" placeholder="e.g., Build to Race Pace" /></div><div id="entries_'+s.id+'"></div><button class="add-entry-btn" onclick="addEntry(\''+s.id+'\')">+ Add Set</button></div></div>';
    document.getElementById('sectionsContainer').insertAdjacentHTML('beforeend',html);
  });
  var acHtml='';
  Object.keys(ATHLETES).forEach(function(id){acHtml+='<label class="athlete-check"><input type="checkbox" value="'+id+'" onchange="this.parentElement.classList.toggle(\'selected\',this.checked)"> '+ATHLETES[id].name+'</label>';});
  document.getElementById('athleteChecks').innerHTML=acHtml;
  var params=new URLSearchParams(window.location.search);
  var aid=params.get('athleteId');
  if(aid){document.querySelectorAll('.athlete-check input').forEach(function(cb){if(cb.value===aid){cb.checked=true;cb.closest('.athlete-check').classList.add('selected');}});}
  showQuote();
})();
function toggleSection(id){var b=document.getElementById('sBody_'+id);b.style.display=b.style.display==='none'?'':'none';}
var entryCounters={};
function addEntry(sid){
  if(!entryCounters[sid])entryCounters[sid]=0;entryCounters[sid]++;
  var n=entryCounters[sid],eid=sid+'_e'+n;
  var strokeOpts=STROKES.map(function(s){return '<option>'+s+'</option>';}).join('');
  var effortOpts=EFFORTS.map(function(e){return '<option>'+(e||'-- Effort --')+'</option>';}).join('');
  var distOpts=DISTANCES.map(function(d){return '<option value="'+d+'">'+d+'</option>';}).join('');
  var equipHtml=EQUIPMENT.map(function(eq){return '<span class="equip-chip" data-eq="'+eq+'" onclick="this.classList.toggle(\'on\')">'+eq+'</span>';}).join('');
  var html='<div class="entry" id="'+eid+'"><button class="remove-entry" onclick="removeEntry(\''+sid+'\',\''+eid+'\')">&times;</button><div class="entry-row"><div class="sm"><label>Reps</label><input type="number" class="e-reps" value="1" min="1" onchange="recalc(\''+sid+'\')"></div><div class="sm"><label>Dist</label><select class="e-dist" onchange="handleDistChange(this,\''+sid+'\')">'+distOpts+'<option value="custom">Other</option></select><input type="number" class="e-dist-custom" style="display:none;margin-top:4px;" placeholder="Custom" onchange="recalc(\''+sid+'\')"></div><div class="md"><label>Stroke</label><select class="e-stroke">'+strokeOpts+'</select></div><div class="md"><label>Effort</label><select class="e-effort">'+effortOpts+'</select></div><div class="md"><label>Interval</label><input type="text" class="e-interval" placeholder="1:30"></div></div><div class="equip-row">'+equipHtml+'</div><div><label>Description (optional)</label><textarea class="e-desc" placeholder="e.g., 100 fr/bk by 25, 100 IM drill, 100 IM swim"></textarea></div><div class="time-toggle"><input type="checkbox" class="e-times" id="t_'+eid+'"><label for="t_'+eid+'">Time slots</label><input type="checkbox" class="e-splits" id="sp_'+eid+'"><label for="sp_'+eid+'">Splits</label></div></div>';
  document.getElementById('entries_'+sid).insertAdjacentHTML('beforeend',html);recalc(sid);
}
function removeEntry(sid,eid){var el=document.getElementById(eid);if(el)el.remove();recalc(sid);}
function handleDistChange(sel,sid){var custom=sel.parentElement.querySelector('.e-dist-custom');if(sel.value==='custom'){custom.style.display='';custom.focus();}else{custom.style.display='none';custom.value='';}recalc(sid);}
function getDistVal(entry){var sel=entry.querySelector('.e-dist');if(sel.value==='custom')return parseInt(entry.querySelector('.e-dist-custom').value)||0;return parseInt(sel.value)||0;}
function recalc(sid){
  var total=0;document.querySelectorAll('#entries_'+sid+' .entry').forEach(function(e){total+=(parseInt(e.querySelector('.e-reps').value)||0)*getDistVal(e);});
  document.getElementById('sYd_'+sid).textContent=total.toLocaleString()+' yds';recalcGrand();
}
function recalcGrand(){
  var g=0;SECTIONS.forEach(function(s){document.querySelectorAll('#entries_'+s.id+' .entry').forEach(function(e){g+=(parseInt(e.querySelector('.e-reps').value)||0)*getDistVal(e);});});
  document.getElementById('grandTotal').textContent=g.toLocaleString();
}
function showQuote(){var q=QUOTES[quoteIndex%QUOTES.length];document.getElementById('quoteText').textContent='"'+q.text+'" -- '+q.author;}
function nextQuote(){quoteIndex++;showQuote();}
function collectWorkout(){
  var workout={title:document.getElementById('workoutTitle').value.trim()||null,sections:[]};
  SECTIONS.forEach(function(s){
    var sTitle=(document.getElementById('sTitle_'+s.id)||{}).value||null;var entries=[];
    document.querySelectorAll('#entries_'+s.id+' .entry').forEach(function(e){
      var equip=[];e.querySelectorAll('.equip-chip.on').forEach(function(c){equip.push(c.dataset.eq);});
      var effort=e.querySelector('.e-effort').value;if(effort==='-- Effort --')effort=null;
      entries.push({reps:parseInt(e.querySelector('.e-reps').value)||1,distance:getDistVal(e),stroke:e.querySelector('.e-stroke').value,effort:effort,interval:e.querySelector('.e-interval').value.trim()||null,equipment:equip,description:e.querySelector('.e-desc').value.trim()||null,showTimes:e.querySelector('.e-times').checked,showSplits:e.querySelector('.e-splits').checked});
    });
    if(entries.length>0)workout.sections.push({id:s.id,label:s.label,title:sTitle,entries:entries});
  });
  var ty=0;workout.sections.forEach(function(sec){sec.entries.forEach(function(en){ty+=en.reps*en.distance;});});
  workout.totalYardage=ty;workout.quote=QUOTES[quoteIndex%QUOTES.length];return workout;
}
function getSelectedAthletes(){var ids=[];document.querySelectorAll('.athlete-check input:checked').forEach(function(cb){ids.push(cb.value);});return ids;}
async function downloadDoc(){
  var workout=collectWorkout();if(workout.sections.length===0){showToast('Add at least one set',true);return;}
  var btn=document.getElementById('downloadBtn');btn.disabled=true;btn.textContent='Generating...';
  try{
    var athletes=getSelectedAthletes();var name=athletes.length===1?ATHLETES[athletes[0]].name:'Workout';
    var res=await fetch('/api/generate-workout-doc',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({workout:workout,athleteName:name,poolType:selectedPool,date:document.getElementById('workoutDate').value,quote:workout.quote})});
    if(!res.ok){var err=await res.json();throw new Error(err.error||'Failed');}
    var blob=await res.blob();var url=URL.createObjectURL(blob);var a=document.createElement('a');
    a.href=url;a.download=(name||'Workout')+'.docx';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
    showToast('Word doc downloaded!');
  }catch(err){showToast('Download failed: '+err.message,true);}
  btn.disabled=false;btn.textContent='Download Word Doc';
}
async function saveWorkout(){
  var athletes=getSelectedAthletes();if(athletes.length===0){showToast('Select at least one athlete',true);return;}
  if(!selectedPool){showToast('Select SCY or LCM',true);return;}
  var workout=collectWorkout();if(workout.sections.length===0){showToast('Add at least one set',true);return;}
  var btn=document.getElementById('saveBtn');btn.disabled=true;btn.textContent='Saving...';
  var saved=0;
  for(var i=0;i<athletes.length;i++){
    var payload={athleteId:athletes[i],date:document.getElementById('workoutDate').value,category:'workout',poolType:selectedPool,stroke:null,sessionNumber:null,durationMinutes:null,coachIntent:null,coachObservation:null,mainSet:null,hiLo:null,note:{workout:workout},charts:[],warnings:[],rawModelOutput:null,correctedData:null,wasRegenerated:false,model:null,noteType:'workout'};
    try{var res=await fetch('/api/save-session',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});if(res.ok)saved++;}catch(e){}
  }
  showToast('Saved to '+saved+' athlete'+(saved===1?'':'s'));
  btn.disabled=false;btn.textContent='Save to Selected Athletes';
}
function showToast(msg,isError){var t=document.getElementById('toast');t.textContent=msg;t.classList.toggle('error',!!isError);t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3800);}
</script>
